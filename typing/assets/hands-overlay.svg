<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Hands Overlay</title>
  <desc id="desc">ホームポジションに指先を合わせた左右の手のガイド</desc>
  <defs>
    <linearGradient id="palmFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde4d2"/>
      <stop offset="100%" stop-color="#efb28f"/>
    </linearGradient>
    <linearGradient id="fingerFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fee8d7"/>
      <stop offset="100%" stop-color="#f3b48a"/>
    </linearGradient>
    <filter id="softShadow" x="-12%" y="-12%" width="124%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#c48c72" flood-opacity="0.18"/>
    </filter>
    <clipPath id="handCrop">
      <rect x="0" y="0" width="1200" height="442"/>
    </clipPath>
    <g id="left-hand">
      <path
        d="M118 520
           C120 476 144 432 184 398
           C230 360 290 344 348 352
           C403 360 454 392 482 440
           C496 464 504 491 506 520
           Z"
        fill="url(#palmFill)"
        stroke="#d89d80"
        stroke-width="5"
        stroke-linejoin="round"/>
      <g fill="none" stroke="url(#fingerFill)" stroke-linecap="round" stroke-linejoin="round">
        <path d="M214 404 C193 358 178 297 168 230" stroke-width="36"/>
        <path d="M274 398 C265 353 262 293 262 230" stroke-width="38"/>
        <path d="M336 394 C340 348 347 289 356 228" stroke-width="40"/>
        <path d="M404 402 C417 360 431 302 450 230" stroke-width="40"/>
        <path d="M422 444 C455 422 492 397 540 372" stroke-width="36"/>
      </g>
      <g fill="none" stroke="#d89d80" stroke-linecap="round" stroke-linejoin="round">
        <path d="M214 404 C193 358 178 297 168 230" stroke-width="5"/>
        <path d="M274 398 C265 353 262 293 262 230" stroke-width="5"/>
        <path d="M336 394 C340 348 347 289 356 228" stroke-width="5"/>
        <path d="M404 402 C417 360 431 302 450 230" stroke-width="5"/>
        <path d="M422 444 C455 422 492 397 540 372" stroke-width="5"/>
        <path d="M232 430 C250 411 270 395 294 382" stroke-width="4" opacity="0.4"/>
        <path d="M286 428 C310 408 336 394 364 384" stroke-width="4" opacity="0.4"/>
        <path d="M346 430 C374 412 402 400 428 392" stroke-width="4" opacity="0.4"/>
      </g>
    </g>
  </defs>

  <g filter="url(#softShadow)" opacity="0.94" clip-path="url(#handCrop)">
    <use href="#left-hand"/>
    <g transform="translate(1182 0) scale(-1 1)">
      <use href="#left-hand"/>
    </g>
  </g>
</svg>
